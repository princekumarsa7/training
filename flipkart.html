<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- header section -->
    <header class="header">
        <div class="top">
            <div class="logo">Flipkart</div>
            <div class="travel">Travel</div>
            <div class="location">Vadodara,Gujarat</div>
        </div>

        <div class="middle">
            <input type="text" placeholder="Search for Products, Brands and More">
            <span>Login</span>
            <span>More</span>
            <span>Cart</span>
        </div>

        <div class="bottom">
            <div class="box"><p>For You</p></div>
            <div class="box"><p>Fashion</p></div>
            <div class="box"><p>Mobile</p></div>
            <div class="box"><p>Beauty</p></div>
            <div class="box"><p>Electronics</p></div>
            <div class="box"><p>Home</p></div>
            <div class="box"><p>Applications</p></div>
            <div class="box"><p>Toys</p></div>
            <div class="box"><p>Food</p></div>
            <div class="box"><p>Automobile</p></div>
            <div class="box"><p>Sports</p></div>
            <div class="box"><p>Books</p></div>
            <div class="box"><p>Furniture</p></div>
            <div class="box"><p>Recharge</p></div>
            <div class="box"><p>Tickets</p></div>
        </div>

    </header>

    <!-- Hero -->
    <Section id="hero">
        <div class="image">
            <img src="https://rukminim2.flixcart.com/fk-p-flap/460/224/image/b6dd09c254ca63d5.jpg?q=80" alt="image1">
            <img src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/5714a453ef7a54f6.png?q=60" alt="image2">
            <img src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/c97e18493141be5e.png?q=60" alt="image3">
        </div>
    </Section>

    <Section id="recomendation">
        <div class="container">
            <img src="https://rukminim2.flixcart.com/fk-p-flap/760/1020/image/8d8a2a4d31b1667d.png?q=60" alt="image11">
            <img src="https://rukminim2.flixcart.com/fk-p-flap/760/1020/image/f0d8d92396f6a183.png?q=60" alt="image12">
            <img src="https://rukminim2.flixcart.com/fk-p-flap/760/1020/image/eb86827054850ce2.png?q=60" alt="image13">
        </div>
    </Section>

    <!-- Footer -->
     <footer class="footer">
        <div class="description">
            <h2>Flipkart</h2>
            <p>Best place to buy</p>
        </div>
        <div class="about">
            <h3>About</h3>
            <p>About us</p>
            <p>Contact Us</p>
            <p>Carrer</p>
            <p>Information</p>
        </div>
        <div class="help">
            <h3>Help</h3>
            <p>Order</p>
            <p>Payment</p>
            <p>FAQ</p>
        </div>
     </footer>
</body>

</html>
